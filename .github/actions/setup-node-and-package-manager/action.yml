name: 'Setup node and package manager'
description: 'Setup node and package manager'

runs:
  using: 'composite'
  steps:
    - uses: pnpm/action-setup@v5
      with:
        version: 10

    - name: Set node version
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'
